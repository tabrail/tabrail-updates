<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tabrail 0.0.7 Release Notes</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #4b5563;
      --link: #1d4ed8;
      --border: #e5e7eb;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #e0ecff 0%, var(--bg) 45%);
      color: var(--text);
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.06);
    }
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 8px 0; color: var(--muted); line-height: 1.55; }
    ul { margin: 14px 0 0 18px; color: var(--text); line-height: 1.6; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>版本说明</h1>
      <p><strong>Version:</strong> 0.0.7 (v0.0.7)</p>
      <p>This build includes stability and quality improvements for Tabrail auto updates.</p>
      <ul>
        <li>Improved update delivery reliability</li>
        <li>Updated signed asset and appcast metadata</li>
        <li>Release validation completed in CI</li>
      </ul>
      <p><a href="https://github.com/tabrail/tabrail-updates/releases/tag/v0.0.7">View full release details</a></p>
    </section>
  </main>
</body>
</html>
